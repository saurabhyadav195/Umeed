{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5 border-0">
    <div class="col-md-6 text-center">
        <div class="p-5 bg-white shadow-sm border rounded-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success rounded-circle mb-3 shadow-sm" style="width: 60px; height: 60px;">
                <span class="fs-3">✉️</span>
            </div>
            <h2 class="fw-bold text-success mb-3">Check Your Email</h2>
            <p class="text-muted mb-4">We've emailed you instructions for setting your password. You should receive them shortly.<br><br>If you don't receive an email, please make sure you've entered the exact address you registered with.</p>
            <a href="{% url 'login' %}" class="btn btn-primary-custom rounded-pill fw-bold px-4">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
