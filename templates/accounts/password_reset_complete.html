{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5 pb-5">
    <div class="col-md-6 text-center">
        <div class="p-5 bg-white shadow-sm border rounded-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success rounded-circle mb-3 shadow-sm" style="width: 80px; height: 80px;">
                <span class="fs-1">✅</span>
            </div>
            <h2 class="fw-bold text-success mb-3">Password Changed</h2>
            <p class="text-muted mb-4 lead">Your password has been successfully updated.</p>
            <a href="{% url 'login' %}" class="btn btn-primary-custom btn-lg rounded-pill fw-bold px-5">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
